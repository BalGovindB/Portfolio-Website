<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UID Form Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .form-page { max-width: 500px; width: 100%; margin: 40px auto; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--cyan);
      margin-bottom: 24px;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 12px; }
    .form-page h2 { text-align: left; margin-bottom: 8px; }
    .form-desc {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--cyan);
      letter-spacing: 1px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    .success-msg {
      display: none;
      background: rgba(0,247,255,0.1);
      border: 1px solid rgba(0,247,255,0.3);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--cyan);
      margin-top: 16px;
    }
  </style>
</head>
<body>
<div class="form-page">
  <a href="index.html" class="back-link">← Back to Portfolio</a>

  <section>
    <h2 class="section-title">UID Form Project</h2>
    <p class="form-desc">// HTML form demonstrating input fields, validation &amp; CSS styling</p>

    <form id="uidForm" class="contact-form">
      <div class="form-grid">
        <div class="field-group">
          <label for="fname">FIRST NAME</label>
          <input type="text" id="fname" placeholder="John" required>
        </div>
        <div class="field-group">
          <label for="lname">LAST NAME</label>
          <input type="text" id="lname" placeholder="Doe" required>
        </div>
      </div>

      <div class="field-group">
        <label for="email">EMAIL</label>
        <input type="email" id="email" placeholder="john@example.com" required>
      </div>

      <div class="field-group">
        <label for="phone">PHONE</label>
        <input type="tel" id="phone" placeholder="+91 9876543210">
      </div>

      <div class="form-grid">
        <div class="field-group">
          <label for="gender">GENDER</label>
          <select id="gender" required>
            <option value="" disabled selected>Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Prefer not to say</option>
          </select>
        </div>
        <div class="field-group">
          <label for="dob">DATE OF BIRTH</label>
          <input type="date" id="dob">
        </div>
      </div>

      <div class="field-group">
        <label for="course">COURSE</label>
        <select id="course">
          <option value="" disabled selected>Select your course</option>
          <option>B.Tech CSE</option>
          <option>B.Tech ECE</option>
          <option>B.Tech Mechanical</option>
          <option>Other</option>
        </select>
      </div>

      <div class="field-group">
        <label for="message">MESSAGE</label>
        <textarea id="message" rows="4" placeholder="Your message here..."></textarea>
      </div>

      <button type="submit" class="btn primary" style="width:100%; border:none; padding:14px;">Submit Form</button>
    </form>

    <div class="success-msg" id="successMsg">
      ✓ Form submitted successfully!
    </div>
  </section>
</div>

<script>
  document.getElementById('uidForm').addEventListener('submit', function(e) {
    e.preventDefault();
    this.style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
</body>
</html>
