<!DOCTYPE html>
<html lang="en">
<head>
    <title>UID Form Project</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
    }

    .container {
        background: white;
        padding: 20px;
        width: 300px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      text-decoration: none;
      color: #0a66c2;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>UID Form Project</h2>

  <form>
    <input type="text" placeholder="Enter Name" required><br><br>
    <input type="email" placeholder="Enter Email" required><br><br>

    <select required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select><br><br>

    <textarea placeholder="Your Message"></textarea><br><br>

    <button type="submit">Submit</button>
  </form>

  <a href="index.html">⬅ Back to Portfolio</a>
</div>

</body>
</html>
